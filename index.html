<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>PortfolioHUB</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>PortfolioHUB</h1>
    <p>Plataforma para exibir e gerenciar portfólios digitais</p>
  </header>

  <section class="login">
    <h2>Login</h2>

    <select id="tipoUsuario">
      <option value="visitante">Visitante</option>
      <option value="admin">Administrador</option>
    </select>

    <input type="password" id="senha" placeholder="Digite a senha">
    <button onclick="entrar()">Entrar</button>

    <p id="mensagemLogin"></p>
  </section>

  <section class="projetos">
    <h2>Projetos</h2>

    <div id="areaAdmin" style="display: none;">
      <input type="text" id="nomeProjeto" placeholder="Nome do projeto">
      <input type="text" id="descricaoProjeto" placeholder="Descrição do projeto">
      <button onclick="adicionarProjeto()">Adicionar Projeto</button>
    </div>

    <div id="listaProjetos">
      <div class="card">
        <h3>Projeto Exemplo</h3>
        <p>Este é um projeto público do PortfolioHUB.</p>
        <button>Compartilhar</button>
      </div>
    </div>
  </section>

  <footer>
    <p>Desenvolvido com apoio do Google Gemini</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
